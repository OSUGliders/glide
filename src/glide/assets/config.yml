# glide deployment configuration
#
# This is a single-document YAML file. Each top-level key below is a required
# section — write `{}` for sections you don't need rather than omitting them.
# Missing sections raise an error at config load time, so you can't silently
# lose configuration to a typo or a stale file.
#
# Sections:
#   trajectory         — deployment id and trajectory variable attributes
#   netcdf_attributes  — global attributes attached to every output netCDF
#   include            — toggles for optional variable suites (flight, thermo)
#   instruments        — per-deployment instrument metadata; emitted as scalar
#                        variables in IOOS NGDAC profile files
#   qc                 — per-variable QC parameter overrides
#                        (valid_min, valid_max, max_gap, interpolate_missing)
#   l1_variables       — additional variables to extract from raw Slocum data
#                        (also where companion variables for time_gps go)
#   merged_variables   — variables assimilated from external processing
#                        (e.g. microstructure)
#
# Full documentation: https://github.com/OSUGliders/glide


# =============================================================================
# DEPLOYMENT INFO
# =============================================================================
# The trajectory variable identifies a single deployment. Its `name` should be
# unique per deployment (date + glider serial is the IOOS convention).

trajectory:
  name: YYYYMMDD_gliderSN
  attributes:
    cf_role: trajectory_id
    comment: "A trajectory is a single deployment of a glider and may span multiple data files."
    long_name: Trajectory/Deployment Name

# Global netCDF attributes (CF + ACDD)
netcdf_attributes:
  title: Example Slocum glider dataset generated by the python package glide.
  comment: glide is developed by the OSU glider group at https://github.com/OSUGliders/glide
  conventions: "CF-1.6, Unidata Dataset Discovery v1.0"


# =============================================================================
# OPTIONAL VARIABLE SUITES
# =============================================================================
# Toggle bundled variable groups on/off. Disabling a suite drops every
# variable in it from the L2 output.

include:
  flight: true   # fin, battpos, heading, ballast_pumped
  thermo: true   # salinity, density, rho0, SA, CT, N2, depth, z, sound_speed


# =============================================================================
# INSTRUMENTS
# =============================================================================
# Each entry under `instruments` becomes a scalar int variable in IOOS NGDAC
# profile files. The variable name is the key; every key/value pair under it
# becomes a NetCDF attribute on that variable. Required attributes per the
# NGDAC convention: long_name, make_model, serial_number, type, platform.
# Recommended: calibration_date, factory_calibrated, calibration_directory_url,
# calibration_report. Any additional keys are written verbatim.
#
# CTD variables in core.yml already declare `instrument: instrument_ctd`; that
# attribute resolves to the matching variable defined here.

instruments:
  instrument_ctd:
    long_name: Slocum glider CTD
    make_model: Sea-Bird GPCTD
    serial_number: ""  # set per deployment
    type: instrument
    platform: platform
    comment: pumped CTD
    calibration_date: ""  # ISO 8601, e.g. "2024-01-15T00:00:00Z"
    factory_calibrated: ""
    calibration_directory_url: ""
    calibration_report: ""


# =============================================================================
# QC PARAMETER OVERRIDES
# =============================================================================
# Override QC parameters for core variables on a per-deployment basis. Only
# these four parameters can be changed: valid_min, valid_max, max_gap,
# interpolate_missing.
#
# Example:
#
# qc:
#   temperature:
#     valid_min: -2.0
#     valid_max: 15.0
#   lat:
#     max_gap: 900
#   pressure:
#     valid_max: 1200.0

qc: {}


# =============================================================================
# L1 EXTRA VARIABLES
# =============================================================================
# Additional variables to extract from raw Slocum data during L1->L2 processing.
# These require a `source` field matching the Slocum sensor name.
#
# Example:
#
# l1_variables:
#   fin:  # this variable is already included in the flight suite — example only
#     source: m_fin
#     conversion: rad_to_deg
#     dtype: f4
#     CF:
#       long_name: Fin angle
#       units: degrees
#
# COMPANION VARIABLES
# A companion variable is placed on a dedicated coordinate dimension (e.g.
# time_gps) instead of the main science time grid. Use this to include
# additional metadata alongside surface GPS fixes. `companion_dim` and
# `drop_from_l2: True` are both required.
#
# l1_variables:
#   hdop_gps:
#     source: m_gps_uncertainty   # GPS dilution of precision
#     companion_dim: time_gps
#     drop_from_l2: True
#     dtype: f4
#     CF:
#       long_name: GPS horizontal dilution of precision
#       units: "1"
#       valid_min: 0.5
#       valid_max: 99.9
#       observation_type: measured

l1_variables: {}


# =============================================================================
# MERGED VARIABLES
# =============================================================================
# Variables to be assimilated from external processing (e.g., microstructure
# from q2netcdf). These are used in higher-level processing steps and do not
# have a `source` field.

merged_variables:
  e_1:
    CF:
      long_name: TKE dissipation rate
      standard_name: specific_turbulent_kinetic_energy_dissipation_in_sea_water
      comment: Estimated using shear probe 1
      units: W kg-1
      valid_min: 0.0
      valid_max: 0.001
      instrument: instrument_microrider
      observation_type: calculated

  e_2:
    CF:
      long_name: TKE dissipation rate
      standard_name: specific_turbulent_kinetic_energy_dissipation_in_sea_water
      comment: Estimated using shear probe 2
      units: W kg-1
      valid_min: 0.0
      valid_max: 0.001
      instrument: instrument_microrider
      observation_type: calculated
