# glide user configuration
# 
# This file configures your glider deployment. Core variables are defined
# in the package and cannot be removed, but their QC parameters can be
# adjusted here.
#
# For documentation, see: https://github.com/OSUGliders/glide

--- ### DEPLOYMENT INFO

# Edit the trajectory name for your deployment (required)
trajectory:
  name: YYYYMMDD_gliderSN
  attributes:
    cf_role: trajectory_id
    comment: "A trajectory is a single deployment of a glider and may span multiple data files."
    long_name: Trajectory/Deployment Name

# Global netCDF attributes (CF standard)
netcdf_attributes:
  title: Example Slocum glider dataset generated by the python package glide.
  comment: glide is developed by the OSU glider group at https://github.com/OSUGliders/glide
  conventions: "CF-1.6, Unidata Dataset Discovery v1.0"

--- ### OPTIONAL VARIABLE SUITES

# Toggle optional variable groups on/off
include:
  flight: true   # fin, battpos, heading, ballast_pumped
  thermo: true    # salinity, density, rho0, SA, CT, N2, depth, z

--- ### QC PARAMETER OVERRIDES

# Override QC parameters for core variables on a per-deployment basis.
# Only these parameters can be changed: valid_min, valid_max, max_gap, interpolate_missing
# Example:
#
# qc:
#   temperature:
#     valid_min: -2.0  
#     valid_max: 15.0
#   lat:
#     max_gap: 900
#   pressure:
#     valid_max: 1200.0

qc: {}

--- ### L1 EXTRA VARIABLES

# Additional variables to extract from raw Slocum data during L1->L2 processing.
# These require a 'source' field matching the Slocum variable name.
# Example:
#
# l1_variables:
#   fin:  # Note that this variable is already included in the flight suite
#     source: m_fin
#     conversion: rad_to_deg
#     dtype: f4
#     CF:
#       long_name: Fin angle
#       units: degrees
#
# COMPANION VARIABLES
# A companion variable is placed on a dedicated coordinate dimension (e.g.
# time_gps) instead of the main science time grid. Use this to include
# additional metadata alongside surface GPS fixes. companion_dim and
# drop_from_l2 are both required.
#
# l1_variables:
#   hdop_gps:
#     source: m_gps_uncertainty   # GPS dilution of precision
#     companion_dim: time_gps
#     drop_from_l2: True
#     dtype: f4
#     CF:
#       long_name: GPS horizontal dilution of precision
#       units: "1"
#       valid_min: 0.5
#       valid_max: 99.9
#       observation_type: measured

--- ### MERGED VARIABLES

# Variables to be assimilated from external processing (e.g., microstructure).
# These are used in higher-level processing and do not have a 'source' field.

merged_variables:
  e_1:
    CF:
      long_name: TKE dissipation rate
      standard_name: specific_turbulent_kinetic_energy_dissipation_in_sea_water
      comment: Estimated using shear probe 1
      units: W kg-1
      valid_min: 0.0
      valid_max: 0.001
      instrument: instrument_microrider
      observation_type: calculated

  e_2:
    CF:
      long_name: TKE dissipation rate
      standard_name: specific_turbulent_kinetic_energy_dissipation_in_sea_water
      comment: Estimated using shear probe 2
      units: W kg-1
      valid_min: 0.0
      valid_max: 0.001
      instrument: instrument_microrider
      observation_type: calculated

--- ### INSTRUMENTS

# Instruments mounted on the glider. Each entry under `instruments:` becomes a
# scalar int variable in IOOS NGDAC profile files (variable name = the key).
# All key/value pairs under an instrument become NetCDF attributes on that
# variable. Required attributes per the NGDAC convention: long_name,
# make_model, serial_number, type, platform. Recommended: calibration_date,
# factory_calibrated, calibration_directory_url, calibration_report. Any
# additional keys are written verbatim.
#
# CTD variables (temperature, conductivity, etc.) in core.yml already declare
# `instrument: instrument_ctd`; that attribute will resolve to the matching
# variable defined here.

instruments:
  instrument_ctd:
    long_name: Slocum Glider CTD
    make_model: Sea-Bird GPCTD
    serial_number: ""  # set per deployment
    type: instrument
    platform: platform
    comment: pumped CTD
    calibration_date: ""  # ISO 8601, e.g. "2024-01-15T00:00:00Z"
    factory_calibrated: ""
    calibration_directory_url: ""
    calibration_report: ""